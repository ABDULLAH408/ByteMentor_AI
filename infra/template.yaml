AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ByteMentor AI - Serverless backend for Always-On AI Coach (Challenge MVP)

Globals:
  Function:
    Timeout: 90
    MemorySize: 512
    Environment:
      Variables:
        TABLE_NAME: !Ref LessonsTable
        GEMINI_API_KEY: !Ref GeminiApiKey
        SES_EMAIL_SENDER: !Ref SESEmailSender
        SES_EMAIL_RECIPIENT: !Ref SESEmailRecipient

Parameters:
  GeminiApiKey:
    Type: String
    NoEcho: true
    Description: Google Gemini API key for Gemini 2.5 Flash.
  SESEmailSender:
    Type: String
    Default: ""
    Description: Verified SES Email address to send lessons from (leave empty to disable email).
  SESEmailRecipient:
    Type: String
    Default: ""
    Description: Email address to send the daily lessons to (leave empty to disable email).

Resources:
  # DynamoDB Table
  LessonsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: ByteMentorLessons
      PrimaryKey:
        Name: lessonDate
        Type: String
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      SSESpecification:
        SSEEnabled: true

  # HTTP API Gateway (replaces Lambda Function URL)
  ByteMentorHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - DELETE
          - PUT
          - PATCH
          - HEAD
          - OPTIONS
        AllowHeaders:
          - content-type
          - authorization
        MaxAge: 86400

  # Lambda Function
  ByteMentorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ByteMentorFunction
      CodeUri: ../backend/
      Handler: dist/index.handler
      Runtime: nodejs22.x
      Events:
        ProxyEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref ByteMentorHttpApi
            Method: ANY
            Path: /{proxy+}
        RootEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref ByteMentorHttpApi
            Method: ANY
            Path: /
      Policies:
        # DynamoDB Read/Write Policy
        - DynamoDBCrudPolicy:
            TableName: !Ref LessonsTable

        # Optional SES Access Policy
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'

  # IAM Role for EventBridge Scheduler
  SchedulerToLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt ByteMentorFunction.Arn

  # EventBridge Scheduler Schedule
  DailyLessonSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: ByteMentorDailySchedule
      Description: Triggers ByteMentor daily lesson generation at 7:00 AM daily
      ScheduleExpression: 'cron(0 7 * * ? *)'
      FlexibleTimeWindow:
        Mode: 'OFF'
      Target:
        Arn: !GetAtt ByteMentorFunction.Arn
        RoleArn: !GetAtt SchedulerToLambdaRole.Arn
        Input: '{"scheduled": true}'

Outputs:
  HttpApiUrl:
    Description: HTTP API endpoint URL to configure in the React frontend
    Value: !Sub 'https://${ByteMentorHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
